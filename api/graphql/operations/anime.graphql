query GetGenres {
    genre {
        id
        name
    }
}

query GetTags {
    tag {
        id
        name
        category
        isAdult
    }
}

query GetPreviewRecommendations($input: PreviewRecommendationsInput!) {
    previewRecommendations(input: $input) {
        id
        titleRomaji
        titleEnglish
        synopsis
        episodeCount
        status
        averageScore
        coverUrl
        genres
        tags
        matchPercentage
    }
}
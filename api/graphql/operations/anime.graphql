fragment GenreInfo on Genre {
    id
    name
}

fragment TagInfo on Tag {
    id
    name
    category
    isAdult
}

query GetGenres {
    genre {
        ...GenreInfo
    }
}

query GetTags {
    tag {
        ...TagInfo
    }
}

query GetPreviewRecommendations($input: PreviewRecommendationsInput!) {
    previewRecommendations(input: $input) {
        id
        titleRomaji
        titleEnglish
        synopsis
        episodeCount
        status
        averageScore
        coverUrl
        genres {
            ...GenreInfo
        }
        tags {
            ...TagInfo
        }
        matchPercentage
    }
}
query GetUser($id: String!) {
  user(id: $id) {
    userId
    displayName
    avatarUrl
    birthDate
    genrePreferences {
      genreId
      weight
    }
    tagPreferences {
      tagId
      weight
    }
    bio
    createdAt
  }
}

mutation CreateUser($input: CreateUserInput!) {
  createUser(createUserInput: $input) {
    userId
    displayName
    avatarUrl
    birthDate
    genrePreferences {
      genreId
      weight
    }
    tagPreferences {
      tagId
      weight
    }
    bio
    createdAt
  }
}
mutation UpdateUser($input: UpdateUserInput!) {
  updateUser(updateUserInput: $input) {
    userId
    displayName
    avatarUrl
    birthDate
    genrePreferences {
      genreId
    }
    tagPreferences {
      tagId
    }
    bio
    createdAt
  }
}
